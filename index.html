<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="習慣">
<meta name="theme-color" content="#F7F6F2">
<title>習慣トラッカー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #EFEDE7;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --text: #1A1917;
  --text2: #6B6A66;
  --text3: #A09F9B;
  --green: #1D9E75;
  --green-bg: #E1F5EE;
  --green-mid: #9FE1CB;
  --green-dk: #085041;
  --green-md: #0F6E56;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-dk: #633806;
  --red: #C13333;
  --red-bg: #FDEAEA;
  --r: 14px;
  --r-sm: 9px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181600;
    --surface: #1F1F1D;
    --surface2: #2A2A28;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #E8E6E0;
    --text2: #9A9892;
    --text3: #66655F;
    --green-bg: #0B3328;
    --green-mid: #1A5E48;
    --green-dk: #9FE1CB;
    --green-md: #5DCAA5;
    --amber-bg: #2E1F00;
    --amber-dk: #FAC775;
    --red-bg: #2E0A0A;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(80px + var(--safe-bottom));
  padding-top: env(safe-area-inset-top, 0px);
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
  padding-top: max(14px, env(safe-area-inset-top, 14px));
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; flex-direction: column; gap: 1px; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.header-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.summer-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border-radius: 20px;
  padding: 6px 12px; cursor: pointer; border: 1px solid var(--border);
  font-size: 12px; color: var(--text2); font-weight: 500;
  transition: all 0.2s; user-select: none;
}
.summer-pill.on { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; }
.sun-icon { font-size: 14px; }

/* Main */
.main { max-width: 480px; margin: 0 auto; padding: 16px 14px; }

/* Metrics */
.metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 14px; }
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 8px 10px;
  text-align: center;
}
.metric-lbl { font-size: 9px; color: var(--text3); letter-spacing: 0.04em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.metric-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -0.03em; line-height: 1; }
.mv-streak { color: var(--amber); }
.mv-green { color: var(--green); }

/* Banner */
.banner {
  display: none; align-items: flex-start; gap: 10px;
  border-radius: var(--r-sm); padding: 11px 14px; margin-bottom: 14px;
  font-size: 13px; font-weight: 500;
}
.banner.show { display: flex; }
.banner.streak-banner { background: var(--amber-bg); color: var(--amber-dk); }
.banner.reset-banner { background: var(--red-bg); color: var(--red); }
.banner-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.banner-sub { font-size: 11px; font-weight: 400; margin-top: 2px; opacity: 0.75; }

/* Calendar */
.cal-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px;
}
.cal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cal-title { font-size: 12px; font-weight: 500; color: var(--text2); }
.cal-legend { display: flex; gap: 9px; }
.leg { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text3); }
.leg-dot { width: 9px; height: 9px; border-radius: 2px; }
.cal-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.cal-cell {
  width: calc((100% - 3px * 13) / 14);
  aspect-ratio: 1;
  border-radius: 4px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--text3);
  font-family: 'DM Mono', monospace; background: var(--bg);
}
.cal-cell.perfect { background: var(--green); border-color: var(--green); color: #fff; font-weight: 700; }
.cal-cell.partial { background: var(--green-mid); border-color: var(--green-mid); color: var(--green-dk); }
.cal-cell.miss { background: var(--surface2); }
.cal-cell.today { border: 2px solid var(--green); }

/* Progress */
.prog-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px;
}
.prog-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.prog-lbl { font-size: 12px; color: var(--text2); }
.prog-num { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
.bar-bg { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fg { height: 7px; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* Habit list */
.section-lbl {
  font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.07em; margin: 18px 0 7px;
}
.habit-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; margin-bottom: 6px;
  transition: background 0.15s, border-color 0.15s;
  -webkit-user-select: none; user-select: none;
}
.habit-card:active { opacity: 0.82; transform: scale(0.99); }
.habit-card.done { background: var(--green-bg); border-color: var(--green-mid); }
.habit-card.skip { opacity: 0.38; pointer-events: none; }
.check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px; color: transparent;
  transition: all 0.18s;
}
.habit-card.done .check { background: var(--green); border-color: var(--green); color: #fff; }
.hname { font-size: 14px; font-weight: 500; }
.habit-card.done .hname { color: var(--green-dk); }
.hdesc { font-size: 11px; color: var(--text3); margin-top: 2px; }
.habit-card.done .hdesc { color: var(--green-md); }
.hstreak {
  margin-left: auto; flex-shrink: 0;
  font-size: 11px; font-weight: 700; color: var(--amber);
  font-family: 'DM Mono', monospace; white-space: nowrap;
}

/* Bottom actions */
.actions {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 14px calc(12px + var(--safe-bottom));
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; gap: 8px; z-index: 20;
}
.btn {
  flex: 1; padding: 14px 10px;
  border-radius: var(--r-sm); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.98); }
.btn.primary { background: var(--green); border-color: var(--green); color: #fff; flex: 2; }
.btn.primary:active { background: #179063; }

/* Toast */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--text); color: var(--surface);
  font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: 20px;
  opacity: 0; pointer-events: none; white-space: nowrap;
  transition: all 0.25s; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-title">習慣トラッカー</div>
    <div class="header-date" id="hdate"></div>
  </div>
  <div class="summer-pill" id="summer-btn" onclick="toggleSummer()">
    <span class="sun-icon">☀</span><span id="summer-lbl">夏モード</span>
  </div>
</header>

<div class="main">
  <div class="metric-row" id="metrics"></div>
  <div class="banner" id="banner"></div>

  <div class="cal-card">
    <div class="cal-top">
      <div class="cal-title">過去28日の記録</div>
      <div class="cal-legend">
        <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>全達成</div>
        <div class="leg"><div class="leg-dot" style="background:var(--green-mid)"></div>一部</div>
      </div>
    </div>
    <div class="cal-grid" id="cal"></div>
  </div>

  <div class="prog-card">
    <div class="prog-top">
      <div class="prog-lbl">今日の進捗</div>
      <div class="prog-num" id="prog-num">0 / 9</div>
    </div>
    <div class="bar-bg"><div class="bar-fg" id="bar" style="width:0%"></div></div>
  </div>

  <div id="habit-list"></div>
</div>

<div class="actions">
  <button class="btn primary" onclick="saveAndCopy()">記録してコピー</button>
  <button class="btn" onclick="resetToday()">リセット</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SECTIONS = [
  { label: "食べ物・飲み物", habits: [
    { id:"snack",   name:"お菓子を食べない",           desc:"間食全般" },
    { id:"konbini", name:"コンビニで衝動買いをしない", desc:"お菓子・お酒など" },
    { id:"coffee",  name:"コーヒー1杯・午前中のみ",    desc:"午後のコーヒー禁止" },
  ]},
  { label: "夜の習慣", habits: [
    { id:"vid22",   name:"22時以降は動画を観ない",     desc:"YouTube・Netflix等" },
    { id:"bedvid",  name:"ベッドで動画を観ない",       desc:"場所で区切る" },
    { id:"stretch", name:"寝る前に10分ストレッチ",      desc:"ベッドに入る前に" },
    { id:"bed23",   name:"23時台にベッドに入る",        desc:"23:00〜23:59" },
  ]},
  { label: "朝の習慣", habits: [
    { id:"wake",    name:"7時30分に起きる",            desc:"スヌーズなし" },
    { id:"walk",    name:"朝散歩をする",                desc:"夏は省略OK", canSkip:true },
  ]},
];
const ALL = SECTIONS.flatMap(s => s.habits);

function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const TODAY = dateKey(new Date());

function load() { try { return JSON.parse(localStorage.getItem('ht_v2')||'{}'); } catch { return {}; } }
function save(d) { try { localStorage.setItem('ht_v2', JSON.stringify(d)); } catch {} }

let db = load();
let done = new Set(db[TODAY]?.done||[]);
let summer = db[TODAY]?.summer||false;

function active() { return ALL.filter(h=>!(h.canSkip&&summer)); }

function calcStreak() {
  let s=0;
  for(let i=0;i<365;i++) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=dateKey(d);
    const rec=i===0?{done:[...done],summer}:db[k];
    if(!rec) break;
    const act=ALL.filter(h=>!(h.canSkip&&rec.summer));
    if((rec.done||[]).length===act.length&&act.length>0) s++;
    else break;
  }
  return s;
}

function calcLongest() {
  let max=0,cur=0;
  Object.keys(db).sort().forEach(k=>{
    const rec=db[k];
    const act=ALL.filter(h=>!(h.canSkip&&rec.summer));
    if((rec.done||[]).length===act.length&&act.length>0){cur++;max=Math.max(max,cur);}else cur=0;
  });
  return Math.max(max,calcStreak());
}

function calcHStreak(id) {
  let s=0;
  for(let i=0;i<365;i++) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=dateKey(d);
    const sm=i===0?summer:(db[k]?.summer||false);
    const h=ALL.find(x=>x.id===id);
    if(h?.canSkip&&sm){if(i>0)s++;continue;}
    const isDone=i===0?done.has(id):(db[k]?.done||[]).includes(id);
    if(isDone)s++;else break;
  }
  return s;
}

function render() {
  const d=new Date();
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('hdate').textContent=
    (d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';

  const btn=document.getElementById('summer-btn');
  const lbl=document.getElementById('summer-lbl');
  btn.className='summer-pill'+(summer?' on':'');
  lbl.textContent=summer?'夏モードON':'夏モード';

  const act=active();
  const total=act.length;
  const n=[...done].filter(id=>act.find(h=>h.id===id)).length;
  const pct=total>0?Math.round(n/total*100):0;
  const streak=calcStreak();
  const longest=calcLongest();
  const totalDays=Object.keys(db).length;

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-lbl">ストリーク</div><div class="metric-val mv-streak">${streak}日</div></div>
    <div class="metric"><div class="metric-lbl">最長</div><div class="metric-val">${longest}日</div></div>
    <div class="metric"><div class="metric-lbl">記録日数</div><div class="metric-val mv-green">${totalDays}日</div></div>
    <div class="metric"><div class="metric-lbl">今日</div><div class="metric-val">${n}/${total}</div></div>
  `;

  const banner=document.getElementById('banner');
  banner.className='banner';
  if(streak>=3){
    const msg=streak>=7?`${streak}日連続達成！`:`${streak}日連続中。7日まであと${7-streak}日`;
    banner.innerHTML=`<span class="banner-icon">★</span><div><div>${msg}</div><div class="banner-sub">この調子で続けよう</div></div>`;
    banner.classList.add('show','streak-banner');
  } else if(streak===0&&totalDays>0&&n<total){
    banner.innerHTML=`<div><div>ストリークがリセットされました</div><div class="banner-sub">今日から再スタート！</div></div>`;
    banner.classList.add('show','reset-banner');
  }

  const cal=document.getElementById('cal');
  cal.innerHTML='';
  for(let i=27;i>=0;i--){
    const dd=new Date(); dd.setDate(dd.getDate()-i);
    const k=dateKey(dd);
    const cell=document.createElement('div');
    cell.className='cal-cell'+(k===TODAY?' today':'');
    cell.textContent=dd.getDate();
    const rec=k===TODAY?{done:[...done],summer}:db[k];
    if(rec){
      const act2=ALL.filter(h=>!(h.canSkip&&rec.summer));
      const got=(rec.done||[]).length;
      if(got===act2.length&&act2.length>0)cell.classList.add('perfect');
      else if(got>0)cell.classList.add('partial');
      else cell.classList.add('miss');
    }
    cal.appendChild(cell);
  }

  document.getElementById('prog-num').textContent=n+' / '+total;
  const bar=document.getElementById('bar');
  bar.style.width=pct+'%';
  bar.style.background=pct===100?'var(--green)':pct>=60?'var(--green-mid)':'#EF9F27';

  const list=document.getElementById('habit-list');
  list.innerHTML='';
  SECTIONS.forEach(sec=>{
    const sl=document.createElement('div');
    sl.className='section-lbl';
    sl.textContent=sec.label;
    list.appendChild(sl);
    sec.habits.forEach(h=>{
      const isSkip=h.canSkip&&summer;
      const isDone=done.has(h.id);
      const hs=calcHStreak(h.id);
      const card=document.createElement('div');
      card.className='habit-card'+(isSkip?' skip':isDone?' done':'');
      card.innerHTML=`
        <div class="check">${isDone?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="hname">${h.name}</div>
          <div class="hdesc">${isSkip?'夏は省略':h.desc}</div>
        </div>
        ${!isSkip&&hs>1?`<div class="hstreak">${hs}日</div>`:''}
      `;
      if(!isSkip) card.onclick=()=>{isDone?done.delete(h.id):done.add(h.id);render();};
      list.appendChild(card);
    });
  });
}

function toggleSummer(){summer=!summer;render();}

function saveAndCopy(){
  const act=active();
  const n=[...done].filter(id=>act.find(h=>h.id===id)).length;
  db[TODAY]={done:[...done],summer,ts:Date.now()};
  save(db);
  render();
  const streak=calcStreak();
  const d=new Date();
  const doneNames=act.filter(h=>done.has(h.id)).map(h=>h.name);
  const missNames=act.filter(h=>!done.has(h.id)).map(h=>h.name);
  let msg=`【習慣日次報告 ${d.getMonth()+1}/${d.getDate()}】\n達成：${n}/${act.length}点　連続：${streak}日\n`;
  if(doneNames.length) msg+=`✅ できた：${doneNames.join('、')}\n`;
  if(missNames.length) msg+=`❌ できなかった：${missNames.join('、')}\n`;
  msg+='\n一言コメントと明日へのアドバイスを1〜2点ください。';
  navigator.clipboard.writeText(msg)
    .then(()=>showToast('報告文をコピーしました'))
    .catch(()=>{
      prompt('コピーしてください',msg);
    });
}

function resetToday(){done.clear();render();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

render();
</script>
</body>
</html>
